<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>EU Vignette — Demo</title>
  <style>
    :root {
      --blue: #2566e6;
      --green: #33c759;
      --yellow: #ffcc00;
      --red: #ff3b30;
      --gray: #aeaeb2;
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --secondary: #8e8e93;
      --separator: #e5e5ea;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }
    .screen { display: none; flex: 1; flex-direction: column; min-height: 0; padding-bottom: calc(64px + var(--safe-bottom)); }
    .screen.active { display: flex; }
    .screen-map {
      padding-bottom: 0;
      height: calc(100dvh - 64px - var(--safe-bottom));
      max-height: calc(100dvh - 64px - var(--safe-bottom));
    }
    .nav {
      background: rgba(242,242,247,0.92);
      backdrop-filter: blur(20px);
      padding: 12px 16px 8px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 0.5px solid var(--separator);
      flex-shrink: 0;
    }
    .nav h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.4px; }
    .nav.compact h1 { font-size: 17px; font-weight: 600; text-align: center; }
    .nav-row { display: flex; align-items: center; gap: 8px; }
    .nav-row h1 { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
    .back-btn {
      background: none; border: none; color: var(--blue);
      font-size: 17px; cursor: pointer; padding: 4px 0; min-width: 60px; text-align: left;
    }
    .icon-btn {
      background: none; border: none; color: var(--blue);
      font-size: 22px; cursor: pointer; min-width: 44px; min-height: 44px;
    }
    .search {
      margin-top: 8px;
      background: rgba(118,118,128,0.12);
      border: none; border-radius: 10px;
      padding: 10px 12px; font-size: 17px; width: 100%;
    }
    .content { flex: 1; overflow-y: auto; padding: 0 0 16px; }
    .list { background: var(--card); margin: 16px; border-radius: 12px; overflow: hidden; }
    .list-flush { margin: 0; border-radius: 0; }
    .row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 0.5px solid var(--separator);
      cursor: pointer; background: var(--card);
    }
    .row:last-child { border-bottom: none; }
    .row:active { background: #f0f0f5; }
    .flag { font-size: 36px; line-height: 1; }
    .flag-sm { font-size: 24px; }
    .row-body { flex: 1; min-width: 0; }
    .row-title { font-size: 17px; font-weight: 600; }
    .row-sub { font-size: 15px; color: var(--secondary); margin-top: 2px; line-height: 1.3; }
    .chevron { color: var(--secondary); font-size: 14px; }
    .section-label {
      font-size: 13px; font-weight: 400; color: var(--secondary);
      text-transform: uppercase; padding: 20px 16px 8px; letter-spacing: 0.2px;
    }
    .price { color: var(--blue); font-weight: 600; font-size: 15px; }
    .badge { font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 999px; }
    .badge-green { background: rgba(52,199,89,0.15); color: #248a3d; }
    .badge-orange { background: rgba(255,149,0,0.15); color: #c93400; }
    .badge-red { background: rgba(255,59,48,0.15); color: var(--red); }
    .plate { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 15px; }
    .meta { font-size: 13px; color: var(--secondary); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-link {
      display: block; width: 100%; text-align: left;
      background: none; border: none; color: var(--blue);
      font-size: 17px; padding: 12px 16px; cursor: pointer;
    }
    .btn-link:active { background: #f0f0f5; }
    .tip { display: flex; gap: 8px; padding: 10px 16px; font-size: 15px; align-items: flex-start; }
    .tabs {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(249,249,249,0.94);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--separator);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 2000;
    }
    .tab {
      flex: 1; border: none; background: none;
      padding: 6px 0 4px; cursor: pointer;
      color: var(--secondary); font-size: 9px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .tab.active { color: var(--blue); }
    .tab-icon { font-size: 20px; line-height: 1; }
    .hero { padding: 16px; display: flex; gap: 16px; align-items: flex-start; }
    .hero .flag { font-size: 56px; }
    .hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .hero p { font-size: 15px; color: var(--secondary); line-height: 1.4; }

    /* Map screen */
    .map-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .map-canvas {
      flex: 1;
      min-height: 240px;
      background: linear-gradient(180deg, #c8daf0 0%, #e8eef5 100%);
      touch-action: none;
      position: relative;
    }
    #europe-map {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #europe-map:active { cursor: grabbing; }
    .country-shape {
      stroke: rgba(255,255,255,0.85);
      stroke-width: 1.2;
      stroke-linejoin: round;
      transition: fill 0.2s ease, opacity 0.2s ease;
      cursor: pointer;
    }
    .country-shape:active { opacity: 0.85; }
    .country-label {
      font-size: 11px;
      font-weight: 600;
      fill: rgba(0,0,0,0.55);
      pointer-events: none;
      text-anchor: middle;
    }
    .map-controls {
      flex-shrink: 0;
      background: var(--bg);
      border-top: 0.5px solid var(--separator);
      padding-bottom: 4px;
    }
    .legend {
      display: flex; flex-wrap: wrap; gap: 6px 10px;
      margin: 8px 12px 0; padding: 8px 10px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-size: 10px;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .timeline-panel {
      margin: 8px 12px 10px; padding: 14px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .timeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .timeline-date { font-size: 16px; font-weight: 600; }
    .today-pill {
      font-size: 11px; font-weight: 600; color: var(--blue);
      background: rgba(37,102,230,0.12); padding: 3px 8px; border-radius: 999px;
    }
    .timeline-slider {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: #ddd; border-radius: 2px; outline: none;
    }
    .timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,0.25); cursor: pointer;
    }
    .timeline-slider::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%; border: none;
      background: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,0.25); cursor: pointer;
    }
    .timeline-range { display: flex; justify-content: space-between; font-size: 11px; color: var(--secondary); margin-top: 6px; }

    /* Country popup sheet */
    .sheet-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      z-index: 3000; align-items: flex-end; justify-content: center;
    }
    .sheet-backdrop.open { display: flex; }
    .sheet {
      width: 100%; max-width: 430px; max-height: 55vh;
      background: var(--bg); border-radius: 16px 16px 0 0;
      overflow-y: auto; padding-bottom: calc(16px + var(--safe-bottom));
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; background: #ccc; border-radius: 2px; margin: 8px auto 0; }
    .sheet-header { padding: 12px 16px 8px; display: flex; align-items: center; gap: 12px; }
    .sheet-header h2 { font-size: 20px; font-weight: 700; }
    .status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; margin: 0 16px 12px;
      background: var(--card); border-radius: 12px;
    }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .status-text { font-size: 15px; font-weight: 600; }
    .status-sub { font-size: 13px; color: var(--secondary); margin-top: 2px; }
    .sheet-btn {
      display: block; margin: 0 16px; padding: 14px;
      background: var(--blue); color: white; text-align: center;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
      cursor: pointer; text-decoration: none;
    }
    .sheet-close {
      margin: 12px 16px 0; padding: 12px; width: calc(100% - 32px);
      background: none; border: none; color: var(--blue); font-size: 16px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- MAP -->
  <div id="screen-map" class="screen screen-map active">
    <div class="nav compact"><h1>Map</h1></div>
    <div class="map-wrap">
      <div class="map-canvas" id="map-canvas">
        <svg id="europe-map" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet" aria-label="Europe vignette map">
          <rect width="900" height="620" fill="url(#sea)" />
          <defs>
            <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#b8cfe8"/>
              <stop offset="100%" stop-color="#dbe6f2"/>
            </linearGradient>
          </defs>
          <g id="countries-layer"></g>
        </svg>
      </div>
      <div class="map-controls">
        <div class="legend" id="legend"></div>
        <div class="timeline-panel">
          <div class="timeline-header">
            <span class="timeline-date" id="timeline-date"></span>
            <span class="today-pill" id="today-pill" style="display:none">Today</span>
          </div>
          <input type="range" class="timeline-slider" id="timeline-slider" min="0" max="365" value="0" step="1">
          <div class="timeline-range">
            <span id="range-start"></span>
            <span id="range-end"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Countries -->
  <div id="screen-countries" class="screen">
    <div class="nav">
      <h1>Countries</h1>
      <input class="search" placeholder="Search countries" oninput="filterCountries(this.value)">
    </div>
    <div class="content"><div class="list" id="country-list"></div></div>
  </div>

  <!-- Country Detail -->
  <div id="screen-detail" class="screen">
    <div class="nav">
      <div class="nav-row">
        <button class="back-btn" onclick="showScreen('countries')">← Countries</button>
        <h1 id="detail-title">Country</h1>
        <span style="min-width:60px"></span>
      </div>
    </div>
    <div class="content" id="detail-content"></div>
  </div>

  <!-- Vignettes -->
  <div id="screen-vignettes" class="screen">
    <div class="nav">
      <div class="nav-row">
        <h1 style="text-align:left">My Vignettes</h1>
        <button class="icon-btn" title="Add">＋</button>
      </div>
    </div>
    <div class="content">
      <div class="list" id="vignette-list"></div>
    </div>
  </div>

  <!-- Trips -->
  <div id="screen-trips" class="screen">
    <div class="nav">
      <div class="nav-row">
        <h1 style="text-align:left">Trip Planner</h1>
        <button class="icon-btn">＋</button>
      </div>
    </div>
    <div class="content">
      <div class="list">
        <div class="row">
          <div class="row-body">
            <div class="row-title">Alpine Road Trip</div>
            <div class="row-sub">Jul 25 – Aug 2, 2026</div>
            <div style="font-size:22px;margin-top:6px">🇦🇹 🇨🇭 🇸🇮</div>
          </div>
          <span class="chevron">›</span>
        </div>
        <div class="row">
          <div class="row-body">
            <div class="row-title">Eastern Europe</div>
            <div class="row-sub">Aug 10 – Aug 20, 2026</div>
            <div style="font-size:22px;margin-top:6px">🇭🇺 🇨🇿 🇸🇰</div>
          </div>
          <span class="chevron">›</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="screen-settings" class="screen">
    <div class="nav"><h1>Settings</h1></div>
    <div class="content">
      <div class="section-label">Vehicle</div>
      <div class="list list-flush">
        <div class="row" style="cursor:default">
          <div class="row-body">
            <div class="row-sub">Default license plate</div>
            <div class="plate" style="margin-top:4px">W-1234AB</div>
          </div>
        </div>
      </div>
      <div class="section-label">About</div>
      <div class="list list-flush">
        <div class="row" style="cursor:default;justify-content:space-between">
          <span>Version</span><span class="row-sub">1.0.0 (HTML preview)</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Map country sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <span class="flag-sm" id="sheet-flag"></span>
        <div>
          <h2 id="sheet-name"></h2>
          <div class="row-sub" id="sheet-date-label"></div>
        </div>
      </div>
      <div class="status-row">
        <div class="status-dot" id="sheet-status-dot"></div>
        <div>
          <div class="status-text" id="sheet-status-label"></div>
          <div class="status-sub" id="sheet-status-sub"></div>
        </div>
      </div>
      <div id="sheet-plate-row" style="display:none;padding:0 16px 12px">
        <div class="row-sub">License plate</div>
        <div class="plate" id="sheet-plate"></div>
      </div>
      <a class="sheet-btn" id="sheet-buy-btn" href="#" target="_blank" rel="noopener" style="display:none">Buy on official portal</a>
      <button class="sheet-close" onclick="closeSheet()">Done</button>
    </div>
  </div>

  <nav class="tabs">
    <button class="tab active" data-tab="map" onclick="switchTab('map')">
      <span class="tab-icon">🗺️</span>Map
    </button>
    <button class="tab" data-tab="countries" onclick="switchTab('countries')">
      <span class="tab-icon">🌍</span>Countries
    </button>
    <button class="tab" data-tab="vignettes" onclick="switchTab('vignettes')">
      <span class="tab-icon">🚗</span>Vignettes
    </button>
    <button class="tab" data-tab="trips" onclick="switchTab('trips')">
      <span class="tab-icon">📋</span>Trips
    </button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')">
      <span class="tab-icon">⚙️</span>Settings
    </button>
  </nav>

  <script src="geo-data.js"></script>
  <script>
    const STATUS = {
      valid:       { label: 'Valid vignette',            color: '#33c759' },
      expiringSoon:{ label: 'Expiring within 30 days',   color: '#ffcc00' },
      missing:     { label: 'Vignette required',         color: '#ff3b30' },
      notRequired: { label: 'No vignette required',      color: '#aeaeb2' }
    };

    const VIGNETTE_IDS = new Set(['AT','CH','SI','HU','CZ','SK','RO','BG','MD']);

    const countries = [
      { id:"AT", name:"Austria", flag:"🇦🇹", summary:"Digital or physical vignette required on all Austrian motorways and expressways.",
        options:[["1 day","€8.60"],["10 days","€11.50"],["2 months","€28.90"],["1 year","€96.40"]],
        tips:["Buy only from the official ASFINAG shop.","Register your license plate correctly."],
        url:"https://shop.asfinag.at/en/" },
      { id:"CH", name:"Switzerland", flag:"🇨🇭", summary:"Annual vignette linked to your license plate required on Swiss motorways.",
        options:[["1 year","CHF 40"]], tips:["Purchase from via.admin.ch."], url:"https://via.admin.ch/shop/" },
      { id:"SI", name:"Slovenia", flag:"🇸🇮", summary:"E-vignette registered to your license plate required on motorways.",
        options:[["7 days","€16.00"],["1 month","€32.00"],["1 year","€117.50"]], tips:["Set start date before entering motorways."], url:"https://evinjeta.dars.si/en" },
      { id:"HU", name:"Hungary", flag:"🇭🇺", summary:"E-matrica system — purchase and register your plate before toll roads.",
        options:[["10 days","HUF 6,400"],["1 month","HUF 10,360"],["1 year","HUF 57,600"]], tips:["County and motorway vignettes differ."], url:"https://ematrica.nemzetiutdij.hu/en/" },
      { id:"CZ", name:"Czech Republic", flag:"🇨🇿", summary:"Motorway vignette linked to your license plate is mandatory.",
        options:[["1 day","CZK 200"],["10 days","CZK 270"],["1 month","CZK 430"],["1 year","CZK 2,440"]], tips:["Set the vignette start date before entering motorways."], url:"https://edalnice.cz/en/index.html" },
      { id:"SK", name:"Slovakia", flag:"🇸🇰", summary:"Electronic vignette registered to your license plate required.",
        options:[["1 day","€8.10"],["10 days","€10.80"],["1 month","€17.10"],["1 year","€90.00"]], tips:["Verify plate country code during checkout."], url:"https://eznamka.sk/en/" },
      { id:"RO", name:"Romania", flag:"🇷🇴", summary:"Rovinieta electronic toll system tied to vehicle registration.",
        options:[["7 days","RON varies"],["30 days","RON varies"],["1 year","RON varies"]], tips:["Tariffs depend on vehicle category."], url:"https://www.roviniete.ro/en/" },
      { id:"BG", name:"Bulgaria", flag:"🇧🇬", summary:"E-vignette linked to your license plate required on motorways.",
        options:[["7 days","BGN varies"],["1 month","BGN varies"],["1 year","BGN varies"]], tips:["Activate before entering tolled sections."], url:"https://www.bgtoll.bg/en" },
      { id:"MD", name:"Moldova", flag:"🇲🇩", summary:"Electronic road vignette for designated national road networks.",
        options:[["7 days","MDL varies"],["15 days","MDL varies"],["30 days","MDL varies"]], tips:["Confirm route coverage before purchase."], url:"https://vinieta.gov.md/en/" }
    ];

    // Real country shapes from Natural Earth (see geo-data.js / europe-countries.geojson)
    function largestRing(geometry) {
      if (geometry.type === 'Polygon') return geometry.coordinates[0];
      if (geometry.type === 'MultiPolygon') {
        const rings = geometry.coordinates.map(p => p[0]);
        return rings.reduce((a, b) => a.length >= b.length ? a : b);
      }
      return [];
    }

    const boundaries = EUROPE_GEOJSON.features.map(f => ({
      id: f.properties.id,
      name: f.properties.name,
      requiresVignette: f.properties.requiresVignette,
      ring: largestRing(f.geometry)
    }));

    function computeMapBounds(items) {
      let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
      items.forEach(b => b.ring.forEach(([lng, lat]) => {
        minLng = Math.min(minLng, lng); maxLng = Math.max(maxLng, lng);
        minLat = Math.min(minLat, lat); maxLat = Math.max(maxLat, lat);
      }));
      const padLng = (maxLng - minLng) * 0.035;
      const padLat = (maxLat - minLat) * 0.035;
      return {
        minLng: minLng - padLng, maxLng: maxLng + padLng,
        minLat: minLat - padLat, maxLat: maxLat + padLat,
        w: 900, h: 620
      };
    }

    let PROJ = computeMapBounds(boundaries);

    function startOfDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    function addDays(d, n) {
      const x = new Date(d);
      x.setDate(x.getDate() + n);
      return startOfDay(x);
    }

    function daysBetween(a, b) {
      return Math.round((startOfDay(b) - startOfDay(a)) / 86400000);
    }

    function fmtDate(d) {
      return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtShort(d) {
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Demo vignettes — relative to today so preview always works
    const today = startOfDay(new Date());
    const timelineEnd = addDays(today, 365);
    const totalDays = daysBetween(today, timelineEnd);

    const demoVignettes = [
      { countryID: 'AT', plate: 'W-1234AB', duration: '10 days', purchase: addDays(today, -10), expiry: addDays(today, 7) },
      { countryID: 'CH', plate: 'ZH-567890', duration: '1 year', purchase: addDays(today, -300), expiry: today }
    ];

    function getStatus(countryID, date) {
      if (!VIGNETTE_IDS.has(countryID)) return 'notRequired';
      const day = startOfDay(date);
      const valid = demoVignettes.filter(v =>
        v.countryID === countryID && v.purchase <= day && day <= v.expiry
      );
      if (!valid.length) return 'missing';
      const best = valid.reduce((a, b) => a.expiry > b.expiry ? a : b);
      const daysLeft = daysBetween(day, best.expiry);
      return daysLeft <= 30 ? 'expiringSoon' : 'valid';
    }

    function statusSummary(countryID, date) {
      const s = getStatus(countryID, date);
      if (s === 'notRequired') return 'No motorway vignette required';
      if (s === 'missing') return 'No valid vignette — purchase required';
      const v = demoVignettes.find(x => x.countryID === countryID && x.purchase <= date && date <= x.expiry);
      if (!v) return STATUS[s].label;
      const daysLeft = daysBetween(date, v.expiry);
      if (s === 'expiringSoon') return `Expires in ${daysLeft} day(s)`;
      return `Valid until ${fmtShort(v.expiry)}`;
    }

    function activeVignette(countryID, date) {
      const day = startOfDay(date);
      return demoVignettes.find(v => v.countryID === countryID && v.purchase <= day && day <= v.expiry);
    }

    // --- SVG Map (no external CDN — works on htmlpreview & phone) ---
    let selectedDayOffset = 0;
    const svgShapes = {};

    function project(lng, lat) {
      const x = ((lng - PROJ.minLng) / (PROJ.maxLng - PROJ.minLng)) * PROJ.w;
      const y = ((PROJ.maxLat - lat) / (PROJ.maxLat - PROJ.minLat)) * PROJ.h;
      return [x, y];
    }

    function polygonPoints(ring) {
      return ring.map(([lng, lat]) => {
        const [x, y] = project(lng, lat);
        return `${x.toFixed(2)},${y.toFixed(2)}`;
      }).join(' ');
    }

    function ringCentroid(ring) {
      let sx = 0, sy = 0;
      ring.forEach(([lng, lat]) => {
        const [x, y] = project(lng, lat);
        sx += x; sy += y;
      });
      return [sx / ring.length, sy / ring.length];
    }

    function initMap() {
      const layer = document.getElementById('countries-layer');
      const ordered = [
        ...boundaries.filter(b => !b.requiresVignette),
        ...boundaries.filter(b => b.requiresVignette)
      ];

      ordered.forEach(b => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('data-id', b.id);

        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        poly.setAttribute('points', polygonPoints(b.ring));
        poly.setAttribute('class', 'country-shape');
        poly.addEventListener('click', () => openSheet(b.id));
        g.appendChild(poly);

        if (b.requiresVignette) {
          const [cx, cy] = ringCentroid(b.ring);
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', cx.toFixed(2));
          label.setAttribute('y', (cy + 4).toFixed(2));
          label.setAttribute('class', 'country-label');
          label.textContent = b.id;
          g.appendChild(label);
        }

        layer.appendChild(g);
        svgShapes[b.id] = poly;
      });

      updateMapColors();
      initMapPanZoom();
    }

    function initMapPanZoom() {
      const svg = document.getElementById('europe-map');
      const canvas = document.getElementById('map-canvas');
      let viewBox = { x: 0, y: 0, w: PROJ.w, h: PROJ.h };
      let dragging = false, last = null;

      function applyViewBox() {
        svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
      }

      canvas.addEventListener('pointerdown', e => {
        if (e.target.closest('.country-shape')) return;
        dragging = true;
        last = { x: e.clientX, y: e.clientY };
        canvas.setPointerCapture(e.pointerId);
      });
      canvas.addEventListener('pointermove', e => {
        if (!dragging || !last) return;
        const rect = canvas.getBoundingClientRect();
        const dx = (e.clientX - last.x) * (viewBox.w / rect.width);
        const dy = (e.clientY - last.y) * (viewBox.h / rect.height);
        viewBox.x -= dx;
        viewBox.y -= dy;
        last = { x: e.clientX, y: e.clientY };
        applyViewBox();
      });
      canvas.addEventListener('pointerup', () => { dragging = false; last = null; });
      canvas.addEventListener('pointercancel', () => { dragging = false; last = null; });

      canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 1.08 : 0.92;
        const rect = canvas.getBoundingClientRect();
        const mx = ((e.clientX - rect.left) / rect.width) * viewBox.w + viewBox.x;
        const my = ((e.clientY - rect.top) / rect.height) * viewBox.h + viewBox.y;
        viewBox.w *= factor;
        viewBox.h *= factor;
        viewBox.x = mx - (mx - viewBox.x) * factor;
        viewBox.y = my - (my - viewBox.y) * factor;
        applyViewBox();
      }, { passive: false });
    }

    function updateMapColors() {
      const date = addDays(today, selectedDayOffset);
      Object.entries(svgShapes).forEach(([id, poly]) => {
        const s = getStatus(id, date);
        const color = STATUS[s].color;
        const opacity = s === 'notRequired' ? 0.45 : 0.78;
        poly.setAttribute('fill', color);
        poly.setAttribute('fill-opacity', opacity);
        poly.setAttribute('stroke-width', s === 'notRequired' ? '0.8' : '1.2');
      });
      document.getElementById('timeline-date').textContent = fmtDate(date);
      document.getElementById('today-pill').style.display = selectedDayOffset === 0 ? 'inline' : 'none';
    }

    function initTimeline() {
      const slider = document.getElementById('timeline-slider');
      slider.max = totalDays;
      document.getElementById('range-start').textContent = fmtShort(today);
      document.getElementById('range-end').textContent = fmtShort(timelineEnd);
      document.getElementById('timeline-date').textContent = fmtDate(today);

      slider.addEventListener('input', () => {
        selectedDayOffset = parseInt(slider.value, 10);
        updateMapColors();
      });
    }

    function initLegend() {
      document.getElementById('legend').innerHTML = Object.entries(STATUS).map(([k, v]) =>
        `<span class="legend-item"><span class="legend-dot" style="background:${v.color}"></span>${v.label}</span>`
      ).join('');
    }

    function openSheet(countryID) {
      const date = addDays(today, selectedDayOffset);
      const b = boundaries.find(x => x.id === countryID);
      const c = countries.find(x => x.id === countryID);
      const s = getStatus(countryID, date);
      const st = STATUS[s];

      document.getElementById('sheet-flag').textContent = c ? c.flag : '';
      document.getElementById('sheet-name').textContent = b.name;
      document.getElementById('sheet-date-label').textContent = 'On ' + fmtShort(date);
      document.getElementById('sheet-status-dot').style.background = st.color;
      document.getElementById('sheet-status-label').textContent = st.label;
      document.getElementById('sheet-status-sub').textContent = statusSummary(countryID, date);

      const v = activeVignette(countryID, date);
      const plateRow = document.getElementById('sheet-plate-row');
      if (v) {
        plateRow.style.display = 'block';
        document.getElementById('sheet-plate').textContent = v.plate;
      } else {
        plateRow.style.display = 'none';
      }

      const buyBtn = document.getElementById('sheet-buy-btn');
      if (c && VIGNETTE_IDS.has(countryID)) {
        buyBtn.style.display = 'block';
        buyBtn.href = c.url;
      } else {
        buyBtn.style.display = 'none';
      }

      document.getElementById('sheet-backdrop').classList.add('open');
    }

    function closeSheet(e) {
      if (e && e.target !== document.getElementById('sheet-backdrop')) return;
      document.getElementById('sheet-backdrop').classList.remove('open');
    }

    // --- Vignette list ---
    function renderVignettes() {
      document.getElementById('vignette-list').innerHTML = demoVignettes.map(v => {
        const daysLeft = daysBetween(today, v.expiry);
        const c = countries.find(x => x.id === v.countryID);
        let badge, badgeClass;
        if (daysLeft < 0) { badge = 'Expired'; badgeClass = 'badge-red'; }
        else if (daysLeft === 0) { badge = 'Expires today'; badgeClass = 'badge-orange'; }
        else if (daysLeft <= 30) { badge = `${daysLeft} days left`; badgeClass = 'badge-orange'; }
        else { badge = `${daysLeft} days left`; badgeClass = 'badge-green'; }
        return `<div class="row" style="flex-direction:column;align-items:stretch;cursor:default">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="flag-sm">${c.flag}</span>
            <span class="row-title">${c.name}</span>
            <span style="flex:1"></span>
            <span class="badge ${badgeClass}">${badge}</span>
          </div>
          <div class="plate">${v.plate}</div>
          <div class="meta"><span>🕐 ${v.duration}</span><span>Expires ${fmtShort(v.expiry)}</span></div>
        </div>`;
      }).join('');
    }

    // --- Countries tab ---
    function renderCountries(list) {
      document.getElementById('country-list').innerHTML = list.map(c => `
        <div class="row" onclick="openCountry('${c.id}')">
          <span class="flag">${c.flag}</span>
          <div class="row-body">
            <div class="row-title">${c.name}</div>
            <div class="row-sub">${c.summary}</div>
          </div>
          <span class="chevron">›</span>
        </div>`).join('');
    }

    function filterCountries(q) {
      const f = q.trim().toLowerCase();
      renderCountries(f ? countries.filter(c => c.name.toLowerCase().includes(f) || c.id.toLowerCase().includes(f)) : countries);
    }

    function openCountry(id) {
      const c = countries.find(x => x.id === id);
      document.getElementById('detail-title').textContent = c.name;
      document.getElementById('detail-content').innerHTML = `
        <div class="hero">
          <span class="flag">${c.flag}</span>
          <div><h2>${c.name}</h2><p>${c.summary}</p></div>
        </div>
        <div class="section-label">Vignette options</div>
        <div class="list list-flush">${c.options.map(([l,p]) => `
          <div class="row" style="cursor:default;justify-content:space-between">
            <span class="row-title" style="font-weight:500">${l}</span>
            <span class="price">${p}</span>
          </div>`).join('')}</div>
        <div class="section-label">Travel tips</div>
        <div class="list list-flush">${c.tips.map(t => `<div class="tip">💡 <span>${t}</span></div>`).join('')}</div>
        <div class="section-label">Official links</div>
        <div class="list list-flush">
          <button class="btn-link" onclick="window.open('${c.url}','_blank')">🛒 Buy on official portal</button>
        </div>`;
      showScreen('detail');
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      if (name === 'detail') document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      showScreen(tab);
    }

    // Init
    initLegend();
    initTimeline();
    renderCountries(countries);
    renderVignettes();
    initMap();
  </script>
</body>
</html>
